# Serves the Angular SPA and proxies auth/api calls to the BFF.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Moderate CSP — tighten per environment. Angular needs inline styles.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'" always;

    # --- Proxy authentication + API to the BFF (server-side session/token) ---
    location ~ ^/(api|auth|oauth2|login|logout)/ {
        proxy_pass http://bff:8070;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cookie_path / /;
    }

    # --- SPA fallback ---
    location / {
        try_files $uri $uri/ /index.html;
    }
}
