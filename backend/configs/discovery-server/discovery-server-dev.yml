spring:
  security:
    user:
      name: ${SO_EUREKA_USER:eurekauser}
      password: ${SO_EUREKA_PASSWORD:eurekapass}

server:
  port: 8761

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: "${SO_EUREKA_URI:http://localhost:8761/eureka}"