# Cross-cutting configuration served by Config Server to EVERY application
# (Spring Cloud Config serves application.yml to all clients at lowest precedence).
management:
  endpoint:
    health:
      probes:
        enabled: true
  tracing:
    sampling:
      # Full sampling in dev; lower it in prod via SO_TRACING_SAMPLING (e.g. 0.1).
      probability: ${SO_TRACING_SAMPLING:1.0}
  zipkin:
    tracing:
      endpoint: ${SO_ZIPKIN_ENDPOINT:http://localhost:9411/api/v2/spans}
