# Common configuration for payment-service (all profiles).
# Environment-specific datasource settings live in payment-service-dev.yml / payment-service-prod.yml.
spring:
  application:
    name: payment-service
  kafka:
    # Host-run dev services reach Kafka via the EXTERNAL listener (advertised as localhost:9094).
    # Containerized deployments override SO_KAFKA_BROKERS with the internal listener (kafka:9092).
    bootstrap-servers: ${SO_KAFKA_BROKERS:localhost:9094}
  cloud:
    stream:
      bindings:
        orderCreated-in-0:
          destination: order.created
          group: payment-svc
          contentType: application/json
          consumer:
            maxAttempts: 3
        paymentSucceeded-out-0:
          destination: payment.succeeded
          contentType: application/json
        paymentFailed-out-0:
          destination: payment.failed
          contentType: application/json
      kafka:
        binder:
          brokers: ${SO_KAFKA_BROKERS:localhost:9094}
        bindings:
          orderCreated-in-0:
            consumer:
              enableDlq: true
              autoCommitOffset: false
              backoffInitialInterval: 1000
              backoffMaxInterval: 5000
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SO_KEYCLOAK_ISSUER:http://localhost:8585/realms/smartorder-bff}

server:
  port: 8082

eureka:
  client:
    service-url:
      defaultZone: ${SO_EUREKA_URI:http://${SO_EUREKA_USER:eurekauser}:${SO_EUREKA_PASSWORD:eurekapass}@localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    org.springframework.cloud.stream: INFO
