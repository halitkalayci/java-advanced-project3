# Common configuration for order-service (all profiles).
# Environment-specific datasource settings live in order-service-dev.yml / order-service-prod.yml.
spring:
  application:
    name: order-service
  kafka:
    # Host-run dev services reach Kafka via the EXTERNAL listener (advertised as localhost:9094).
    # Containerized deployments override SO_KAFKA_BROKERS with the internal listener (kafka:9092).
    bootstrap-servers: ${SO_KAFKA_BROKERS:localhost:9094}
  cloud:
    function:
      definition: paymentSucceeded;paymentFailed
    openfeign:
      circuitbreaker:
        enabled: true
      client:
        config:
          catalog-service:
            connect-timeout: 2000
            read-timeout: 2000
    stream:
      kafka:
        binder:
          brokers: ${SO_KAFKA_BROKERS:localhost:9094}
        bindings:
          paymentSucceeded-in-0:
            consumer:
              enableDlq: true
          paymentFailed-in-0:
            consumer:
              enableDlq: true
      bindings:
        orderCreated-out-0:
          destination: order.created
          content-type: application/json
        paymentSucceeded-in-0:
          destination: payment.succeeded
          group: order-svc
          content-type: application/json
          consumer:
            maxAttempts: 3
        paymentFailed-in-0:
          destination: payment.failed
          group: order-svc
          content-type: application/json
          consumer:
            maxAttempts: 3
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SO_KEYCLOAK_ISSUER:http://localhost:8585/realms/smartorder-bff}

server:
  port: 8081

eureka:
  client:
    service-url:
      defaultZone: ${SO_EUREKA_URI:http://${SO_EUREKA_USER:eurekauser}:${SO_EUREKA_PASSWORD:eurekapass}@localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        # A missing product (404) is a normal outcome, not a catalog failure —
        # it must not count toward opening the breaker.
        ignore-exceptions:
          - com.smartorder.orderservice.infrastructure.catalog.CatalogNotFoundException
  timelimiter:
    configs:
      default:
        # Must exceed the Feign read-timeout (2s) so the breaker doesn't cut
        # healthy-but-slow calls before Feign's own timeout fires.
        timeout-duration: 4s
