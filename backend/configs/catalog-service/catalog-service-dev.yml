# Dev profile: file-based H2 (zero external setup). Schema managed by Flyway.
spring:
  datasource:
    url: jdbc:h2:file:${SO_DB_DIR:./data}/catalog;AUTO_SERVER=TRUE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;
    username: sa
    password: ""
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: true
    baseline-on-migrate: true
