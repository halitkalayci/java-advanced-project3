spring:
  application:
    name: bff
  security:
    oauth2:
      client:
        provider:
          keycloak:
            # Explicit endpoints (instead of issuer-uri) so the BFF does NOT perform
            # eager OIDC discovery at startup. With issuer-uri the app fails to boot
            # whenever Keycloak is unreachable; explicit endpoints defer the network
            # call until an actual login/token exchange happens.
            authorization-uri: ${SO_KEYCLOAK_ISSUER:http://localhost:8585/realms/smartorder-bff}/protocol/openid-connect/auth
            token-uri: ${SO_KEYCLOAK_ISSUER:http://localhost:8585/realms/smartorder-bff}/protocol/openid-connect/token
            jwk-set-uri: ${SO_KEYCLOAK_ISSUER:http://localhost:8585/realms/smartorder-bff}/protocol/openid-connect/certs
            user-info-uri: ${SO_KEYCLOAK_ISSUER:http://localhost:8585/realms/smartorder-bff}/protocol/openid-connect/userinfo
            user-name-attribute: preferred_username
        registration:
          keycloak:
            client-id: bff-web
            # Confidential client secret — supplied via environment, never committed.
            client-secret: ${KEYCLOAK_BFF_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            authorization-grant-type: authorization_code
            scope:
              - openid
              - profile
              - email

server:
  port: 8070

bff:
  frontend-url: ${BFF_FRONTEND_URL:http://localhost:4200}

eureka:
  client:
    service-url:
      defaultZone: ${SO_EUREKA_URI:http://${SO_EUREKA_USER:eurekauser}:${SO_EUREKA_PASSWORD:eurekapass}@localhost:8761/eureka}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

logging:
  level:
    com.smartorder.bff: INFO
