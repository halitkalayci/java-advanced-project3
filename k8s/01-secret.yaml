# Template Secret. In real environments generate this from a sealed-secret /
# external secret manager — do NOT commit real values.
apiVersion: v1
kind: Secret
metadata:
  name: smartorder-secrets
  namespace: smartorder
type: Opaque
stringData:
  SO_CONFIG_USER: "configuser"
  SO_CONFIG_PASSWORD: "change-me"
  # Eureka credentials are embedded in the registry URL the clients use.
  SO_EUREKA_URI: "http://eurekauser:change-me@discovery-server-internal:8761/eureka"
  SO_EUREKA_USER: "eurekauser"
  SO_EUREKA_PASSWORD: "change-me"
  KEYCLOAK_BFF_SECRET: "change-me"
